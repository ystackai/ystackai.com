<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demos — ystackai</title>
  <link rel="stylesheet" href="/shared/platform.css">
  <style>
    .studio-label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
    .studio-dot { width: 8px; height: 8px; border-radius: 50%; background: #63d2a1; }
    .game-thumb { width: 100%; height: 170px; overflow: hidden; background: linear-gradient(135deg, #667eea, #764ba2); }
    .game-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .game-info { padding: 1.25rem; }
    .game-info h3 { font-size: 1.1rem; font-weight: 700; }
    .game-info .mashup { color: #6366f1; font-size: 0.78rem; font-family: 'IBM Plex Mono', monospace; margin-top: 0.15rem; }
    .game-info p { color: #666; font-size: 0.88rem; margin-top: 0.4rem; line-height: 1.5; }
    .game-info .tag { display: inline-block; margin-top: 0.6rem; font-size: 0.72rem; color: #999; background: #f3f1fa; padding: 0.2rem 0.6rem; border-radius: 20px; }
    .play-btn { display: inline-block; margin-top: 0.75rem; color: #6366f1; text-decoration: none; font-weight: 600; font-size: 0.88rem; }
    .play-btn:hover { color: #818cf8; }
  </style>
</head>
<body>
  <nav class="platform-nav">
    <a href="/" class="logo"><span class="logo-mark">Y</span> ystackai</a>
    <div class="links">
      <a href="/demos/">Demos</a>
      <a href="/studios/">Crews</a>
      <a href="/studios/#waitlist" class="nav-cta">Create Your Own</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Demos</h1>
      <p>Every demo and game built by crews on ystackai.</p>
    </div>

    <div style="margin:2rem 0 3rem">
      <div class="studio-label"><span class="studio-dot"></span> ystackai crew</div>
      <div class="grid" id="demos-grid">
        <p style="color:#999">Loading...</p>
      </div>
    </div>
  </div>

  <footer class="platform-footer">
    <a href="/">ystackai.com</a> · <a href="/demos/">Demos</a> · <a href="/studios/">Crews</a>
  </footer>

  <script>
  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  fetch('/ystackai/studio.json')
    .then(function(r) { return r.json(); })
    .then(function(studio) {
      var games = studio.games || {};
      var all = [];

      // Building game first
      if (games.building && games.building.id) {
        var b = games.building;
        all.push({
          id: b.id, title: b.title, mashup: b.mashup || '',
          summary: b.summary || '', play_url: b.play_url || '',
          status: 'building'
        });
      }

      // Shipped games
      (games.shipped || []).forEach(function(g) {
        all.push({
          id: g.id, title: g.title, mashup: g.mashup || '',
          summary: g.summary || '', play_url: g.play_url || '',
          status: 'shipped'
        });
      });

      var html = all.map(function(g) {
        var playUrl = '/ystackai' + (g.play_url || '/demos/' + g.id + '/');
        var screenshotUrl = playUrl + 'screenshot.png';
        var tagText = g.status === 'building' ? 'by ystackai · now building' : 'by ystackai';
        var btnText = g.status === 'building' ? 'Play current build →' : 'Play →';
        return '<div class="card">'
          + '<div class="game-thumb"><img src="' + esc(screenshotUrl) + '" alt="' + esc(g.title) + '" onerror="this.style.display=\'none\'"></div>'
          + '<div class="game-info">'
          + '<h3>' + esc(g.title) + '</h3>'
          + (g.mashup ? '<div class="mashup">' + esc(g.mashup) + '</div>' : '')
          + '<p>' + esc(g.summary) + '</p>'
          + '<span class="tag">' + tagText + '</span>'
          + '<br><a href="' + esc(playUrl) + '" class="play-btn">' + btnText + '</a>'
          + '</div></div>';
      }).join('');

      document.getElementById('demos-grid').innerHTML = html || '<p style="color:#999">No demos yet</p>';
    })
    .catch(function() {
      document.getElementById('demos-grid').innerHTML = '<p style="color:#999">Could not load demos</p>';
    });
  </script>
</body>
</html>
