<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ops Dashboard — ystackai</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; padding: 1.5rem; }
    h1 { font-size: 1.1rem; color: #888; font-weight: 400; margin-bottom: 1rem; }
    h1 span { color: #4ade80; }
    .meta { color: #555; font-size: 11px; margin-bottom: 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1rem; }
    .card { background: #111827; border: 1px solid #1e293b; border-radius: 8px; padding: 1rem; }
    .card.warning { border-color: #f59e0b; }
    .card.ok { border-color: #1e293b; }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .studio-name { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
    .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-ideation { background: #1e3a5f; color: #60a5fa; }
    .badge-building { background: #1e3a1f; color: #4ade80; }
    .badge-finished { background: #1a2e1a; color: #86efac; }
    .badge-aborted { background: #3b1a1a; color: #f87171; }
    .badge-idle { background: #1e1e2e; color: #888; }
    .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1e293b; }
    .row:last-child { border-bottom: none; }
    .label { color: #64748b; }
    .value { color: #e2e8f0; text-align: right; }
    .value.good { color: #4ade80; }
    .value.warn { color: #f59e0b; }
    .value.bad { color: #f87171; }
    .value.muted { color: #475569; }
    .alerts { margin-top: 0.5rem; }
    .alert { background: #2d1b0e; color: #fbbf24; font-size: 11px; padding: 4px 8px; border-radius: 4px; margin-top: 4px; }
    .title-text { font-size: 11px; color: #94a3b8; font-style: italic; margin-bottom: 0.5rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .loading { color: #555; text-align: center; padding: 4rem; }
    .error { color: #f87171; text-align: center; padding: 4rem; }
    .refresh-btn { background: none; border: 1px solid #334155; color: #94a3b8; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px; }
    .refresh-btn:hover { border-color: #4ade80; color: #4ade80; }
  </style>
</head>
<body>
  <h1>ops / <span>production health</span> <button class="refresh-btn" onclick="load()">refresh</button></h1>
  <div class="meta" id="meta">loading...</div>
  <div class="grid" id="grid"><div class="loading">Fetching status...</div></div>

<script>
function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function badgeClass(status) {
  return 'badge badge-' + (status || 'idle');
}

function valueClass(key, val) {
  if (key === 'success_rate') {
    if (val === null || val === undefined) return 'value muted';
    if (val >= 70) return 'value good';
    if (val >= 40) return 'value warn';
    return 'value bad';
  }
  if (key === 'messages_24h') {
    if (val <= 0) return 'value bad';
    if (val < 5) return 'value warn';
    return 'value good';
  }
  return 'value';
}

function renderCard(s) {
  var drop = s.drop || {};
  var brief = s.brief || {};
  var discord = s.discord || {};
  var gws = s.gws || {};
  var alerts = s.alerts || [];

  var briefStatus = brief.exists ? brief.length + ' chars' : (brief.is_placeholder ? 'placeholder' : 'empty');
  var briefClass = brief.exists ? 'value good' : 'value bad';

  var timeDisplay = (drop.time_remaining || {}).display || '-';
  var timeLabel = (drop.time_remaining || {}).label || '';

  var successRate = gws.success_rate !== null && gws.success_rate !== undefined ? gws.success_rate + '%' : '-';

  var html = '<div class="card ' + (alerts.length ? 'warning' : 'ok') + '">';
  html += '<div class="card-head">';
  html += '<span class="studio-name">' + esc(s.slug) + '</span>';
  html += '<span class="' + badgeClass(drop.status) + '">' + esc(drop.status || 'idle') + '</span>';
  html += '</div>';

  if (drop.title) {
    html += '<div class="title-text">' + esc(drop.title) + '</div>';
  }

  html += '<div class="row"><span class="label">time remaining</span><span class="value">' + esc(timeDisplay) + (timeLabel ? ' <span style="color:#64748b;font-size:10px">(' + esc(timeLabel) + ')</span>' : '') + '</span></div>';
  html += '<div class="row"><span class="label">brief</span><span class="' + briefClass + '">' + esc(briefStatus) + '</span></div>';
  html += '<div class="row"><span class="label">discord 24h</span><span class="' + valueClass('messages_24h', discord.messages_24h) + '">' + (discord.messages_24h >= 0 ? discord.messages_24h + ' msgs' : 'n/a') + '</span></div>';
  html += '<div class="row"><span class="label">events 24h</span><span class="value">' + (discord.total_events_24h >= 0 ? discord.total_events_24h : 'n/a') + '</span></div>';

  html += '<div class="row"><span class="label">gws outcomes</span><span class="value">' + (gws.outcomes_total || 0) + ' total / ' + (gws.outcomes_active || 0) + ' active</span></div>';
  html += '<div class="row"><span class="label">gws success rate</span><span class="' + valueClass('success_rate', gws.success_rate) + '">' + esc(successRate) + ' (' + (gws.work_items_succeeded || 0) + '/' + (gws.work_items_total || 0) + ')</span></div>';

  if (gws.top_errors && gws.top_errors.length) {
    html += '<div style="margin-top:0.5rem;border-top:1px solid #1e293b;padding-top:0.5rem">';
    html += '<div class="label" style="margin-bottom:4px">gws errors</div>';
    for (var i = 0; i < gws.top_errors.length; i++) {
      var err = gws.top_errors[i];
      html += '<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:11px"><span style="color:#f87171;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px">' + esc(err.reason) + '</span><span style="color:#64748b">' + err.count + 'x</span></div>';
    }
    html += '</div>';
  }

  if (alerts.length) {
    html += '<div class="alerts">';
    for (var i = 0; i < alerts.length; i++) {
      html += '<div class="alert">' + esc(alerts[i]) + '</div>';
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function load() {
  document.getElementById('grid').innerHTML = '<div class="loading">Fetching...</div>';
  fetch('/ops/status.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('meta').textContent = 'Generated: ' + data.generated_at + ' · ' + data.studio_count + ' studios';
      var html = '';
      (data.studios || []).forEach(function(s) { html += renderCard(s); });
      document.getElementById('grid').innerHTML = html || '<div class="loading">No studios.</div>';
    })
    .catch(function(err) {
      document.getElementById('grid').innerHTML = '<div class="error">Failed to load: ' + err.message + '</div>';
    });
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
