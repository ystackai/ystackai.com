<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — ystackai studio</title>
  <link rel="stylesheet" href="/shared/studio-theme.css">
</head>
<body>
  <div id="nav"></div>
  <div class="container-narrow">
    <div class="page-header"><h1>Blog</h1></div>
    <div id="blog-posts"></div>
  </div>
  <div id="footer"></div>

  <script src="/shared/studio-shell.js"></script>
  <script src="/shared/studio-components.js"></script>
  <script>
    StudioShell.init('ystackai').then(function () {
      StudioShell.renderNav('nav');
      Components.blogList(StudioShell.data.blog_posts, 'blog-posts');
      document.getElementById('footer').innerHTML = Components.footer();
    });
  </script>
</body>
</html>
