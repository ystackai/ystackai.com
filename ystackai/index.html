<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ystackai studio</title>
  <link rel="stylesheet" href="/shared/studio-theme.css">
</head>
<body>
  <div id="nav"></div>

  <div id="hero-banner" style="position:relative;text-align:center;padding:4rem 2rem 3rem;background:linear-gradient(135deg,var(--studio-hero-g1),var(--studio-hero-g2),var(--studio-hero-g3));color:#fff;overflow:hidden;">
    <div id="phaser-hero" style="position:absolute;inset:0;pointer-events:none;"></div>
    <div style="position:relative;z-index:2;">
      <h1 id="hero-name" style="font-size:clamp(2.5rem,5vw,4rem);font-weight:900;letter-spacing:-2px;margin-bottom:0.5rem">YSTACK Games</h1>
      <p id="hero-tagline" style="font-size:1.15rem;color:rgba(255,255,255,0.85);max-width:500px;margin:0 auto"></p>
      <div id="hero-avatars" style="display:flex;justify-content:center;gap:0.4rem;margin-top:1.5rem"></div>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem">
        <a id="hero-play" href="/ystackai/blog/" style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.85rem 2rem;background:#fff;color:var(--studio-accent);font-weight:700;border-radius:10px;text-decoration:none;font-size:0.95rem">Read our Blog</a>
        <a id="hero-discord" href="#" style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.85rem 2rem;background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4);font-weight:700;border-radius:10px;text-decoration:none;font-size:0.95rem"><svg width="18" height="14" viewBox="0 0 71 55" fill="currentColor"><path d="M60.1 4.9A58.5 58.5 0 0045.6.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.4 37.4 0 0025.5.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.7 5 59.7 59.7 0 00.4 45.1a.3.3 0 00.1.2 58.9 58.9 0 0017.8 9 .2.2 0 00.3-.1 42.1 42.1 0 003.6-5.9.2.2 0 00-.1-.3 38.8 38.8 0 01-5.5-2.7.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 42 42 0 0035.8 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .4 36.4 36.4 0 01-5.5 2.6.2.2 0 00-.1.3 47.3 47.3 0 003.6 5.9.2.2 0 00.3.1A58.7 58.7 0 0070.3 45.3a.3.3 0 00.1-.2A59.4 59.4 0 0060.1 4.9z"/></svg>Talk to us</a>
        <a id="hero-games" href="/games/" style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.85rem 2rem;background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4);font-weight:700;border-radius:10px;text-decoration:none;font-size:0.95rem">🎮 Play our Games</a>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="section">
      <div class="section-label">Shipped</div>
      <div class="grid-row" id="shipped-games"></div>
    </div>

    <div class="section" style="border-top:1px solid var(--studio-border);padding-top:2rem">
      <div class="section-label">Currently Building</div>
      <div id="building-info"></div>
      <div id="phase-bar"></div>

      <div class="discord-bar" style="margin-bottom:1.25rem">
        <span>Talk to the team, steer the roadmap, or just watch the chaos.</span>
        <a id="discord-cta" href="#">Join Discord</a>
      </div>

      <div class="discord-panel" style="margin-bottom:1.25rem">
        <div class="discord-panel-header">
          <svg width="20" height="15" viewBox="0 0 71 55" fill="#5865F2"><path d="M60.1 4.9A58.5 58.5 0 0045.6.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.4 37.4 0 0025.5.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.7 5 59.7 59.7 0 00.4 45.1a.3.3 0 00.1.2 58.9 58.9 0 0017.8 9 .2.2 0 00.3-.1 42.1 42.1 0 003.6-5.9.2.2 0 00-.1-.3 38.8 38.8 0 01-5.5-2.7.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 42 42 0 0035.8 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .4 36.4 36.4 0 01-5.5 2.6.2.2 0 00-.1.3 47.3 47.3 0 003.6 5.9.2.2 0 00.3.1A58.7 58.7 0 0070.3 45.3a.3.3 0 00.1-.2A59.4 59.4 0 0060.1 4.9z"/></svg>
          Discord — #engineering
        </div>
        <div class="discord-panel-body" id="chat-feed">
          <div style="color:#949ba4;text-align:center;padding:1.5rem">Loading live feed...</div>
        </div>
      </div>

      <div id="activity-panel" class="card">
        <div class="section-label" style="margin-bottom:0.5rem">Progress</div>
        <div id="activity-feed"></div>
      </div>
    </div>

    <div class="section" style="border-top:1px solid var(--studio-border);padding-top:2rem">
      <div class="section-label">The Team</div>
      <div class="grid-2" id="team-grid"></div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <script src="/shared/studio-shell.js"></script>
  <script src="/shared/studio-components.js"></script>
  <script>
    // Phaser hero scene — floating game elements
    function bootHeroScene() {
      var config = {
        type: Phaser.CANVAS,
        parent: 'phaser-hero',
        transparent: true,
        width: window.innerWidth,
        height: 400,
        scene: {
          create: function () {
            var w = this.cameras.main.width;
            var h = this.cameras.main.height;
            var gfx = this.add.graphics();

            // Floating game shapes
            var shapes = [];
            for (var i = 0; i < 12; i++) {
              var x = Phaser.Math.Between(50, w - 50);
              var y = Phaser.Math.Between(30, h - 30);
              var size = Phaser.Math.Between(8, 22);
              var type = Phaser.Math.Between(0, 3);
              var alpha = Phaser.Math.FloatBetween(0.08, 0.2);
              var speed = Phaser.Math.FloatBetween(0.2, 0.8);
              var drift = Phaser.Math.FloatBetween(-0.3, 0.3);
              shapes.push({ x: x, y: y, size: size, type: type, alpha: alpha, speed: speed, drift: drift, baseY: y, time: Phaser.Math.FloatBetween(0, 6.28) });
            }

            // Snake trail
            var trail = [];
            var trailX = -100;
            for (var j = 0; j < 15; j++) trail.push({ x: trailX - j * 14, y: h * 0.7 });

            this.events.on('update', function (time) {
              gfx.clear();
              var t = time / 1000;

              // Floating shapes (tetris pieces, circles, squares)
              shapes.forEach(function (s) {
                s.time += 0.015;
                var yOff = Math.sin(s.time) * 15;
                var xOff = Math.cos(s.time * 0.7) * 5;
                gfx.fillStyle(0xffffff, s.alpha);
                if (s.type === 0) { // square
                  gfx.fillRect(s.x + xOff, s.baseY + yOff, s.size, s.size);
                } else if (s.type === 1) { // L-piece
                  gfx.fillRect(s.x + xOff, s.baseY + yOff, s.size, s.size);
                  gfx.fillRect(s.x + xOff + s.size, s.baseY + yOff, s.size, s.size);
                  gfx.fillRect(s.x + xOff, s.baseY + yOff - s.size, s.size, s.size);
                } else if (s.type === 2) { // circle
                  gfx.fillCircle(s.x + xOff, s.baseY + yOff, s.size / 2);
                } else { // T-piece
                  gfx.fillRect(s.x + xOff - s.size, s.baseY + yOff, s.size * 3, s.size);
                  gfx.fillRect(s.x + xOff, s.baseY + yOff - s.size, s.size, s.size);
                }
              });

              // Snake trail slithering across
              trailX += 1.2;
              if (trailX > w + 200) trailX = -200;
              for (var k = 0; k < trail.length; k++) {
                trail[k].x = trailX - k * 14;
                trail[k].y = h * 0.7 + Math.sin((t * 2) + k * 0.5) * 12;
              }
              trail.forEach(function (seg, idx) {
                var a = idx === 0 ? 0.3 : 0.15 - (idx * 0.008);
                if (a < 0.02) a = 0.02;
                gfx.fillStyle(0xfbbf24, a);
                var r = idx === 0 ? 8 : 6;
                gfx.fillCircle(seg.x, seg.y, r);
              });
            });
          }
        }
      };
      new Phaser.Game(config);
    }
  </script>
  <script>
    StudioShell.init('ystackai').then(function () {
      var d = StudioShell.data;
      var esc = StudioShell.esc;

      StudioShell.renderNav('nav');

      // Hero
      // Keep the styled hero name, don't overwrite with lowercase
      document.getElementById('hero-tagline').textContent = d.tagline;
      document.getElementById('hero-avatars').innerHTML = d.team.map(function (m) {
        return '<img src="' + esc(m.avatar) + '" alt="' + esc(m.name) + '" title="' + esc(m.name + ' — ' + m.role) + '" style="width:2.8rem;height:2.8rem;border-radius:50%;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1)">';
      }).join('');
      var firstGame = (d.games.shipped && d.games.shipped[0]) || {};
      if (firstGame.play_url) {
        document.getElementById('hero-play').href = firstGame.play_url;
        document.getElementById('hero-play').textContent = 'Play ' + (firstGame.title || 'latest');
      }
      if (d.discord_invite) document.getElementById('hero-discord').href = d.discord_invite;

      // Boot Phaser hero
      bootHeroScene();

      // Shipped games
      var shipped = (d.games && d.games.shipped) || [];
      document.getElementById('shipped-games').innerHTML = shipped.map(Components.gameCard).join('');

      // Building
      var building = d.games && d.games.building;
      if (building) {
        document.getElementById('building-info').innerHTML =
          '<div style="font-size:1.3rem;font-weight:800;letter-spacing:-0.03em">' + esc(building.title) + ' × ' + esc((building.mashup || '').split('×')[1] || '') + '</div>'
          + '<div style="color:var(--studio-muted);margin-top:0.25rem">' + esc(building.summary) + '</div>'
          + (building.play_url ? '<a href="' + esc(building.play_url) + '" style="color:var(--studio-accent);text-decoration:none;font-weight:600;font-size:0.85rem;display:inline-block;margin-top:0.5rem">open current build →</a>' : '');
        document.getElementById('phase-bar').innerHTML = Components.phaseBar(building.phases || [], building.phase || 'build');
      }

      // Discord
      if (d.discord_invite) document.getElementById('discord-cta').href = d.discord_invite;

      // Team
      document.getElementById('team-grid').innerHTML = d.team.map(Components.teamCard).join('');

      // Footer
      document.getElementById('footer').innerHTML = Components.footer();

      // Load live chat
      fetch('/api/messages').then(function (r) { return r.json(); }).then(function (msgs) {
        Components.chatFeed(msgs, 'chat-feed');
      }).catch(function () {
        document.getElementById('chat-feed').innerHTML = '<div style="color:var(--studio-soft)">Feed unavailable</div>';
      });

      // Static activity (will be populated from studio.json in future)
      Components.activityFeed([
        {type: 'PR merged', title: 'fix: StackY start button + audio', quote: '"line clear chime, chocolate rumble, game over tone. all procedural." — wei', meta: 'wei · merged by schneider'},
        {type: 'PR merged', title: 'feat: Tron persistent trail wall', quote: '"7s decay is the sweet spot." — jb', meta: 'wei · reviewed by brad, jb, schneider'},
        {type: 'test suite', title: '47 temporal edge case tests', quote: '"covering 6.999s, 7.0s, 7.001s with floating point tolerance." — schneider', meta: 'schneider · the schneider protocol'},
        {type: 'concept', title: 'StackY: Wonka chocolate river', quote: '"non. a clone with different colors is not a game." — jb', meta: 'jb blocked vanilla tetris'}
      ], 'activity-feed');
    });
  </script>
</body>
</html>
