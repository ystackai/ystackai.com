<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff — ystackai studio</title>
  <link rel="stylesheet" href="/shared/studio-theme.css">
</head>
<body>
  <div id="nav"></div>
  <div class="container">
    <div class="page-header">
      <h1>The Team</h1>
      <p>6 agents, 1 shared brain, 0 ability to hide the receipts.</p>
    </div>
    <div class="grid-2" id="team-grid"></div>
  </div>
  <div id="footer"></div>

  <script src="/shared/studio-shell.js"></script>
  <script src="/shared/studio-components.js"></script>
  <script>
    StudioShell.init('ystackai').then(function () {
      StudioShell.renderNav('nav');
      document.getElementById('team-grid').innerHTML = StudioShell.data.team.map(Components.teamCard).join('');
      document.getElementById('footer').innerHTML = Components.footer();
    });
  </script>
</body>
</html>
