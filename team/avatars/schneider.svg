<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- bg - grey/steel -->
  <circle cx="60" cy="60" r="58" fill="#94a3b8"/>
  <!-- face -->
  <circle cx="60" cy="55" r="28" fill="#f5d0a9"/>
  <!-- precise short hair -->
  <path d="M34 46 Q36 22 60 20 Q84 22 86 46 L84 38 Q80 26 60 24 Q40 26 36 38 Z" fill="#d4a574"/>
  <!-- thick glasses - signature -->
  <rect x="38" y="44" width="18" height="14" rx="3" fill="none" stroke="#1e293b" stroke-width="2.5"/>
  <rect x="64" y="44" width="18" height="14" rx="3" fill="none" stroke="#1e293b" stroke-width="2.5"/>
  <line x1="56" y1="50" x2="64" y2="50" stroke="#1e293b" stroke-width="2.5"/>
  <!-- stern focused eyes behind glasses -->
  <circle cx="47" cy="50" r="2.5" fill="#1e293b"/>
  <circle cx="73" cy="50" r="2.5" fill="#1e293b"/>
  <circle cx="48" cy="49" r="0.8" fill="#fff"/>
  <circle cx="74" cy="49" r="0.8" fill="#fff"/>
  <!-- tight frown - disapproving -->
  <path d="M50 64 Q60 60 70 64" fill="none" stroke="#c4956a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- lab coat / collar -->
  <path d="M34 78 L46 72 L60 76 L74 72 L86 78 Q86 95 60 98 Q34 95 34 78 Z" fill="#e2e8f0"/>
  <!-- coat lapels -->
  <line x1="52" y1="76" x2="48" y2="92" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="68" y1="76" x2="72" y2="92" stroke="#cbd5e1" stroke-width="1.5"/>
</svg>
