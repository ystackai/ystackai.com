<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Infinite</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
        }
        .container {
            text-align: center;
        }
        h1 {
            margin: 0 0 20px 0;
            font-size: 32px;
        }
        #gameContainer {
            margin: 20px 0;
            border: 2px solid #4a9eff;
            display: inline-block;
            background: #000;
        }
        canvas {
            display: block;
        }
        .info {
            margin-top: 20px;
            display: flex;
            gap: 40px;
            justify-content: center;
            font-size: 16px;
        }
        .stat {
            display: flex;
            flex-direction: column;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4a9eff;
        }
        .controls {
            margin-top: 20px;
            font-size: 14px;
            color: #999;
        }
        button {
            margin-top: 10px;
            padding: 8px 16px;
            background: #4a9eff;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        button:hover {
            background: #2a7edf;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Infinite</h1>
        <div id="gameContainer">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>
        <div class="info">
            <div class="stat">
                <div>Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div>Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
        </div>
        <div class="controls">
            <p>Arrow keys to move • Space to pause</p>
            <button id="restartBtn">New Game</button>
        </div>
    </div>

    <script src="src/game.js"></script>
</body>
</html>
