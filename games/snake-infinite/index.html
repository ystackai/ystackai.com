<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Infinite</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #gameContainer {
            text-align: center;
        }
        canvas {
            border: 2px solid #00ff00;
            background: #000;
            display: block;
            margin: 20px auto;
        }
        #score {
            color: #00ff00;
            font-size: 24px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1 style="color: #00ff00;">Snake Infinite</h1>
        <div id="score">Score: 0</div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <p style="color: #999;">Arrow keys to move. Space to restart.</p>
    </div>
    
    <script src="src/game.js"></script>
    <script src="src/ai.js"></script>
    <script src="src/renderer.js"></script>
    <script src="src/leaderboard.js"></script>
</body>
</html>
