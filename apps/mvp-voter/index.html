<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 MVP Vote — Ship Party 9PM 🐍🎉</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --snake-dark: #1a472a;
    --snake-green: #2d8a4e;
    --snake-lime: #4ade80;
    --snake-mint: #bbf7d0;
    --accent-yellow: #fbbf24;
    --accent-pink: #f472b6;
    --accent-purple: #a78bfa;
    --accent-orange: #fb923c;
    --accent-cyan: #22d3ee;
    --accent-red: #f87171;
    --bg-dark: #0f1a14;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg-dark);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== FLOATING EMOJI BG ===== */
  .bg-emojis {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-emojis span {
    position: absolute;
    font-size: 2rem;
    opacity: 0.12;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.12; }
    90% { opacity: 0.12; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 2.5rem 1rem 1rem;
    position: relative;
    z-index: 1;
  }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    background: linear-gradient(135deg, var(--accent-yellow), var(--accent-pink), var(--accent-purple), var(--accent-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease-in-out infinite alternate;
  }
  @keyframes shimmer {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(40deg); }
  }
  .header p {
    font-size: 1.1rem;
    color: var(--snake-mint);
    margin-top: 0.5rem;
  }

  /* ===== MAIN ===== */
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 1rem 1.25rem 3rem;
    position: relative;
    z-index: 1;
  }

  /* ===== NOMINEE CARDS ===== */
  .nominees {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .nominee-card {
    background: rgba(45, 138, 78, 0.15);
    border: 2px solid transparent;
    border-radius: 1rem;
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: relative;
    overflow: hidden;
  }
  .nominee-card:hover {
    background: rgba(45, 138, 78, 0.3);
    border-color: var(--snake-lime);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(74, 222, 128, 0.15);
  }
  .nominee-card.selected {
    border-color: var(--accent-yellow);
    background: rgba(251, 191, 36, 0.15);
    box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
  }
  .nominee-card.selected .card-emoji {
    animation: bounce-pop 0.4s ease;
  }
  @keyframes bounce-pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .card-emoji {
    font-size: 2.5rem;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .card-body h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    color: #fff;
  }
  .card-body p {
    font-size: 0.9rem;
    color: var(--snake-mint);
    margin-top: 0.15rem;
  }
  .check-mark {
    position: absolute;
    right: 1.25rem;
    top: 50%;
    transform: translateY(-50%) scale(0);
    font-size: 1.5rem;
    transition: transform 0.3s ease;
  }
  .nominee-card.selected .check-mark {
    transform: translateY(-50%) scale(1);
  }

  /* ===== VOTE BAR ===== */
  .results {
    margin-top: 1.5rem;
  }
  .results h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    text-align: center;
    margin-bottom: 1rem;
    color: var(--accent-cyan);
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }
  .bar-label {
    width: 2.5rem;
    text-align: center;
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    height: 2rem;
    background: rgba(255,255,255,0.08);
    border-radius: 1rem;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 1rem;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    padding-left: 0.75rem;
    font-weight: 900;
    font-size: 0.85rem;
    min-width: 0;
    white-space: nowrap;
  }
  .bar-count {
    width: 2.5rem;
    text-align: right;
    font-weight: 900;
    font-size: 1rem;
    color: var(--accent-yellow);
    flex-shrink: 0;
  }

  /* ===== VOTE BUTTON ===== */
  .vote-btn {
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 1.5rem auto 0;
    padding: 1rem 2rem;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    color: var(--bg-dark);
    background: linear-gradient(135deg, var(--accent-yellow), var(--accent-orange));
    box-shadow: 0 4px 20px rgba(251, 191, 36, 0.35);
    transition: all 0.25s ease;
  }
  .vote-btn:hover:not(:disabled) {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 30px rgba(251, 191, 36, 0.5);
  }
  .vote-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .vote-btn.voted {
    background: linear-gradient(135deg, var(--snake-green), var(--accent-cyan));
    color: #fff;
  }

  /* ===== CELEBRATION BURST ===== */
  @keyframes burst {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
  }
  .burst {
    position: fixed;
    top: 50%; left: 50%;
    width: 100px; height: 100px;
    margin: -50px 0 0 -50px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-yellow), var(--accent-pink), transparent 70%);
    animation: burst 0.6s ease-out forwards;
    pointer-events: none;
    z-index: 100;
  }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 2rem 1rem;
    color: rgba(255,255,255,0.3);
    font-size: 0.8rem;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<!-- floating emoji background -->
<div class="bg-emojis" id="bgEmojis"></div>

<div class="header">
  <h1>🏆 MVP Vote 🏆</h1>
  <p>Pick your favorite ship moment tonight! 🐍✨</p>
</div>

<div class="container">
  <div class="nominees" id="nominees"></div>

  <button class="vote-btn" id="voteBtn" disabled onclick="castVote()">
    Pick a moment first! ☝️
  </button>

  <div class="results" id="results" style="display:none;">
    <h2>🔥 Live Results 🔥</h2>
    <div id="bars"></div>
  </div>
</div>

<div class="footer">yStack Ship Party 9 PM — vote closes at midnight 🐍🎉</div>

<script>
  // ===== NOMINEES =====
  const NOMINEES = [
    { id: 'speedrun',   emoji: '⚡',  title: 'Speed Demon Deploy',     desc: 'Fastest PR-to-prod of the night' },
    { id: 'clutch',     emoji: '🔥',  title: 'Clutch Bug Fix',         desc: 'Saved the demo at the last second' },
    { id: 'creative',   emoji: '🎨',  title: 'Most Creative Feature',  desc: 'The wildest, coolest new thing' },
    { id: 'teamwork',   emoji: '🤝',  title: 'Best Collab Moment',     desc: 'Teamwork made the dream work' },
    { id: 'vibes',      emoji: '🐍',  title: 'Best Vibes Overall',     desc: 'Energy, hype, and good times' },
    { id: 'underdog',   emoji: '🚀',  title: 'Underdog Ship',          desc: 'Nobody expected it — but they shipped it' },
  ];

  const COLORS = [
    'var(--accent-cyan)',
    'var(--accent-orange)',
    'var(--accent-pink)',
    'var(--accent-purple)',
    'var(--snake-lime)',
    'var(--accent-yellow)',
  ];

  const STORAGE_KEY = 'mvp-vote-9pm-party';

  // ===== STATE =====
  let selected = null;
  let hasVoted = false;
  let votes = {};

  function init() {
    NOMINEES.forEach(n => votes[n.id] = 0);

    // Load from localStorage
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        if (data.votes) Object.assign(votes, data.votes);
        if (data.myVote) {
          hasVoted = true;
          selected = data.myVote;
        }
      } catch(e) {}
    }

    renderNominees();
    if (hasVoted) {
      showResults();
      document.getElementById('voteBtn').textContent = 'Thanks for voting! 🎉';
      document.getElementById('voteBtn').classList.add('voted');
      document.getElementById('voteBtn').disabled = true;
    }

    createBgEmojis();
  }

  function renderNominees() {
    const container = document.getElementById('nominees');
    container.innerHTML = NOMINEES.map(n => `
      <div class="nominee-card ${selected === n.id ? 'selected' : ''}"
           data-id="${n.id}"
           onclick="selectNominee('${n.id}')">
        <div class="card-emoji">${n.emoji}</div>
        <div class="card-body">
          <h3>${n.title}</h3>
          <p>${n.desc}</p>
        </div>
        <div class="check-mark">✅</div>
      </div>
    `).join('');
  }

  function selectNominee(id) {
    if (hasVoted) return;
    selected = id;
    renderNominees();
    const btn = document.getElementById('voteBtn');
    btn.disabled = false;
    const nom = NOMINEES.find(n => n.id === id);
    btn.textContent = `Vote for ${nom.emoji} ${nom.title}!`;
  }

  function castVote() {
    if (!selected || hasVoted) return;
    hasVoted = true;
    votes[selected] = (votes[selected] || 0) + 1;

    // Save
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      votes,
      myVote: selected,
      timestamp: Date.now(),
    }));

    // Celebration burst
    const burst = document.createElement('div');
    burst.className = 'burst';
    document.body.appendChild(burst);
    setTimeout(() => burst.remove(), 700);

    // Button state
    const btn = document.getElementById('voteBtn');
    btn.textContent = 'Thanks for voting! 🎉';
    btn.classList.add('voted');
    btn.disabled = true;

    // Disable card clicks
    renderNominees();
    showResults();
  }

  function showResults() {
    const resultsEl = document.getElementById('results');
    resultsEl.style.display = 'block';

    const barsEl = document.getElementById('bars');
    const totalVotes = Object.values(votes).reduce((a, b) => a + b, 0) || 1;
    const maxVotes = Math.max(...Object.values(votes), 1);

    barsEl.innerHTML = NOMINEES.map((n, i) => {
      const count = votes[n.id] || 0;
      const pct = Math.round((count / maxVotes) * 100);
      return `
        <div class="bar-row">
          <div class="bar-label">${n.emoji}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${COLORS[i % COLORS.length]};">
              ${pct > 15 ? n.title : ''}
            </div>
          </div>
          <div class="bar-count">${count}</div>
        </div>
      `;
    }).join('');
  }

  // ===== FLOATING EMOJI BG =====
  function createBgEmojis() {
    const emojis = ['🐍','🏆','🎉','⚡','🔥','🎨','🤝','🚀','✨','💛','🎯','💜'];
    const container = document.getElementById('bgEmojis');
    for (let i = 0; i < 25; i++) {
      const span = document.createElement('span');
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = Math.random() * 100 + '%';
      span.style.animationDuration = (8 + Math.random() * 12) + 's';
      span.style.animationDelay = (Math.random() * 10) + 's';
      span.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
      container.appendChild(span);
    }
  }

  init();
</script>
</body>
</html>
